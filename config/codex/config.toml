model_provider = "right"
model = "gpt-5.4"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
approval_policy = "never"                # 自动执行，无需确认
sandbox_mode = "danger-full-access"         # 允许写入工作区（最低要求）
disable_response_storage = true
network_access = true
personality = "pragmatic"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

[model_providers.right]
name = "right"
base_url = "https://www.codeplanai.com"
wire_api = "responses"
requires_openai_auth = true

# --- MCP servers added by Codex CLI ---
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.mcp-server-time]
command = "npx" # USE YOUR ACTUAL PATH
args = ["-y", "@mcpcentral/mcp-time"]

[mcp_servers.mcp-shrimp-task-manager]
command = "npx"
args = ["-y", "mcp-shrimp-task-manager"]
env = { DATA_DIR = "/Users/lostsheep/tools/mcp-shrimp-task-manager/data", TEMPLATES_USE = "zh", ENABLE_GUI = "false" }

[mcp_servers.mcp-deepwiki]
command = "npx"
args = ["-y", "mcp-deepwiki@latest"]
startup_timeout_ms = 60000

[mcp_servers.desktop-commander]
command = "node"
args = ["/home/ppw/uniswap_learning/DesktopCommanderMCP/dist/index.js"]


